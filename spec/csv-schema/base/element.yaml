name: element
abstract: true

fields:
  - name: id
    type: string
    required: true

  - name: name
    type: string

  - name: number
    type: string

  - name: level_id
    type: reference
    reference: level
    required: true

  - name: created_at
    type: datetime
    computed: true

  - name: updated_at
    type: datetime
    computed: true

  - name: base_offset
    type: float

  - name: volume
    type: float
    computed: true

  - name: bbox_min_x
    type: float
    computed: true

  - name: bbox_min_y
    type: float
    computed: true

  - name: bbox_min_z
    type: float
    computed: true

  - name: bbox_max_x
    type: float
    computed: true

  - name: bbox_max_y
    type: float
    computed: true

  - name: bbox_max_z
    type: float
    computed: true

