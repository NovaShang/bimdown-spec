name: mep_connected_segment
abstract: true
description: >
  Connectivity fields linking MEP curves to their endpoint nodes.
  Revit export populates these from connector references.
  When AI designs MEP networks, it places duct/pipe endpoints at matching coordinates;
  the CLI resolve-topology command then detects coincident endpoints, generates
  mep_node entries, and back-fills start_node_id and end_node_id on each segment.

fields:
  - name: start_node_id
    type: string
    description: "ID of the upstream node (equipment, terminal, or mep_node). Written by Revit export; supplemented by CLI resolve-topology."

  - name: end_node_id
    type: string
    description: "ID of the downstream node (equipment, terminal, or mep_node). Written by Revit export; supplemented by CLI resolve-topology."
