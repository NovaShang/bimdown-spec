name: hosted_element
bases:
  - element
abstract: true

fields:
  - name: host_id
    type: reference
    reference: element
    description: ID of the host wall. Required unless host_x/host_y are provided (auto-resolved by build).

  - name: position
    type: float
    description: Distance in meters from the host element's start point to the center of this opening. Required unless host_x/host_y are provided (auto-resolved by build).

  - name: host_x
    type: float
    description: X coordinate of the opening center (alternative to position). Build auto-resolves to host_id + position.

  - name: host_y
    type: float
    description: Y coordinate of the opening center (alternative to position). Build auto-resolves to host_id + position.
