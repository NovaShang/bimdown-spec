name: mesh

fields:
  - name: id
    type: string
    required: true

  - name: category
    type: string
    required: true
    description: Revit category name (e.g. "Railings", "Generic Models", "Furniture", "Plumbing Fixtures")

  - name: name
    type: string

  - name: level_id
    type: reference
    reference: level

  - name: mesh_file
    type: string
    required: true
    description: Path to GLB file relative to project root

  - name: x
    type: float
    default: 0

  - name: y
    type: float
    default: 0

  - name: z
    type: float
    default: 0

  - name: rotation
    type: float
    default: 0
    description: Rotation around Z axis in degrees
